<!DOCTYPE html>

<head>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #1565c0;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    .contenedor {
      display: grid;
      gap: 15px;
      max-width: 650px;
      margin: 40px auto;
    }

    .boton {
      display: block;
      background: #1565c0;
      color: white;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }

    .boton:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .volver {
      display: inline-block;
      margin-top: 30px;
      color: #333;
      font-weight: bold;
      text-decoration: none;
    }

    .volver:hover {
      text-decoration: underline;
    }
  </style>
</head>
